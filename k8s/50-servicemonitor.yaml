# Prometheus Operator ServiceMonitor for Keycloak.
#
# The J26 cluster runs kube-prometheus-stack; its Prometheus selects ServiceMonitors
# by `release: kps` (across all namespaces). Keycloak exposes Prometheus metrics on
# its management port (9000) at /metrics (KC_METRICS_ENABLED=true).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keycloak
  namespace: j26-keycloak-scoutid
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - j26-keycloak-scoutid
  selector:
    matchLabels:
      app: keycloak
  endpoints:
    - port: management
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

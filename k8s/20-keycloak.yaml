# NOTE: the keycloak-admin Secret (KC_BOOTSTRAP_ADMIN_* + MASTER_ADMIN_*) lives in
# secrets.local.yaml (gitignored), applied by apply.sh before this file. See
# secrets.example.yaml for the template.
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: j26-keycloak-scoutid
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    # Keycloak management port: /health/* and the Prometheus /metrics endpoint.
    # Scraped by the keycloak ServiceMonitor.
    - name: management
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: j26-keycloak-scoutid
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: docker.io/library/postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U keycloak; do
                echo "waiting for postgres..."; sleep 3;
              done
      containers:
        - name: keycloak
          # Branch-tracking tag: CI (.github/workflows/build-image.yml, type=ref,event=branch)
          # repushes :minimal-scoutid on every push to that branch, so this ref never needs
          # editing per build. imagePullPolicy: Always so a `kubectl rollout restart` picks up
          # the latest push. Pin to a digest (or :sha-<commit>) instead for a reproducible release.
          image: ghcr.io/scouterna/j26-keycloak:minimal-scoutid
          imagePullPolicy: Always
          args: ["start", "--optimized"]
          env:
            # --- Database (plain user/password to the in-cluster Postgres) ---
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: POSTGRES_PASSWORD
            # --- Hostname / proxy (TLS terminated at the Traefik ingress) ---
            # Public (member-facing) hostname. Keycloak refuses to serve the admin
            # console here; only /realms/*, /resources/* etc. are reachable.
            - name: KC_HOSTNAME
              value: https://id.dev.j26.se
            # Separate admin hostname. The admin console + /admin/* are served only
            # under this host, which the Traefik IngressRoute can IP-gate.
            - name: KC_HOSTNAME_ADMIN
              value: https://admin.id.dev.j26.se
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            # Per-user-event metrics (keycloak_logins / failed_login_attempts /
            # registrations, labelled by realm). The `user-event-metrics` feature is
            # baked into the image (docker/Dockerfile, build-time); these runtime vars
            # enable + tag the per-user-event series. Requires an image built with that
            # feature — under `start --optimized` they are inert/incompatible otherwise.
            - name: KC_EVENT_METRICS_USER_ENABLED
              value: "true"
            - name: KC_EVENT_METRICS_USER_TAGS
              value: realm,idp,clientId
            # --- Bootstrap admin ---
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
            # --- Scoutnet API base (the provider reads this env var) ---
            - name: SCOUTNET_BASE_URL
              value: https://scoutnet.se
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 1280Mi

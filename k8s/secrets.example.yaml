# Template for the cluster secrets. Copy to secrets.local.yaml (gitignored) and fill
# in real values, then run apply.sh (which applies secrets.local.yaml first).
#
#   cp k8s/secrets.example.yaml k8s/secrets.local.yaml
#   # edit the passwords
#
# Generate strong values, e.g.:  openssl rand -base64 24 | tr -d '/+=' | head -c 28
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db
  namespace: j26-keycloak-scoutid
type: Opaque
stringData:
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: CHANGEME-db-password
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: j26-keycloak-scoutid
type: Opaque
stringData:
  # Bootstrap (temporary) admin used to create the first permanent admin.
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: CHANGEME-bootstrap-password
  # Permanent master-realm admin created by ensure-master-admin.sh.
  MASTER_ADMIN_USERNAME: hakan
  MASTER_ADMIN_PASSWORD: CHANGEME-permanent-admin-password

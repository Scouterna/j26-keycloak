# The jamboree26 realm holds all ScoutID/Scoutnet login config. The master realm
# is left stock (admin only) — see ensure-master-admin.sh. Mirrors the
# master/jamboree26 separation on dev.id.scouterna.se. Ported from the full
# upstream provider's own example config (scoutid-keycloak-provider/keycloak-config/,
# which targets its local `master` realm) — renamed to jamboree26 and merged with
# J26-specific settings (internationalization, login behavior) below.
realm: jamboree26
enabled: true

# Token and session lifetimes — matched to the dev.id.scouterna.se / id.dev.j26.se
# baseline export taken as the production source of truth.
accessTokenLifespan: 1800         # 30 minutes
ssoSessionIdleTimeout: 2592000    # 30 days
ssoSessionMaxLifespan: 2592000    # 30 days

# Shared ScoutID login theme (upstream scoutid-keycloak-theme, baked into the
# upstream image — no longer vendored/rebranded in this repo).
loginTheme: scoutid

# Internationalization — the login theme ships en + sv. Swedish is the primary
# audience; English is available via ?ui_locales=en or an Accept-Language: en
# browser. Without this block Keycloak only serves the default locale and ignores
# ui_locales/Accept-Language (also reported upstream — see scoutid-keycloak-provider
# branch fix/realm-example-i18n).
internationalizationEnabled: true
supportedLocales:
  - sv
  - en
defaultLocale: sv

# Login settings — matched to the production baseline export. Login is by username
# only (loginWithEmailAllowed: false); duplicate emails are allowed because Scoutnet
# accounts can share an address.
registrationAllowed: false
resetPasswordAllowed: false
rememberMe: false
loginWithEmailAllowed: false
registrationEmailAsUsername: false
duplicateEmailsAllowed: true
verifyEmail: false
editUsernameAllowed: false

# Parent group + required child groups for the TWO j26-scoutid-sync CronJobs
# (funktionärer sync + participants sync). Both read/write their managed subtree
# UNDER /j26-scoutid-sync. Neither creates the parent, nor the top-level child groups
# that config.yml's assignments reference — those must PRE-EXIST or the sync throws
# `Group "<name>" not found in Keycloak` / `Parent group "<name>" not found`. The
# scripts DO create the dynamic sub-groups on demand (function slugs, j26-rover, and
# all children under j26-groups/j26-villages/j26-districts — per-kår/village/district),
# which must NOT be in config. So we declare the parent + only the required top-level
# children here.
#   funktionär sync (app-manifest/j26-scoutid-sync) needs: j26-staff, j26-planning-staff
#   participants sync (app-manifest/j26-scoutid-sync-participants) needs: j26-leader,
#     j26-leader-staff, and the dynamic parents j26-groups, j26-villages, j26-districts
# IMPORTANT: the config-cli Job MUST run with IMPORT_MANAGED_GROUP=no-delete
# (j26-infra .../40-config-cli.yaml). config-cli's default 'full' managed mode would
# PRUNE every group not listed here — i.e. wipe everything the syncs create under
# these children (dev had j26-groups=577, j26-villages=242) — on each realm import.
# no-delete lets config-cli create/update the declared groups while leaving the
# sync-owned descendants untouched.
# j26-planning-staff carries client roles (ported from dev) so planning staff get
# signupinfo summaries + platsbank booking access via resource_access.<client>.roles.
# The others have no roles in dev.
groups:
  - name: j26-scoutid-sync
    subGroups:
      - name: j26-staff
      - name: j26-planning-staff
        clientRoles:
          j26-signupinfo:
            - "summaries:read"
          j26-platsbank:
            - "requests:staff:book"
            - "requests:create"
      - name: j26-leader
      - name: j26-leader-staff
      - name: j26-groups
      - name: j26-villages
      - name: j26-districts

attributes:
  userProfileEnabled: "true"

userProfile:
  groups:
    - name: basic
      displayHeader: Grunduppgifter
    - name: contact
      displayHeader: Kontaktuppgifter
    - name: scout
      displayHeader: Scoutuppgifter

  attributes:
    - name: username
      displayName: ${username}
      group: basic
      validations:
        length:
          min: 3
          max: 255
        up-username-not-idn-homograph: {}
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: email
      displayName: ${email}
      group: basic
      validations:
        email: {}
        length:
          max: 255
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: firstName
      displayName: ${firstName}
      group: basic
      validations:
        length:
          max: 255
        person-name-prohibited-characters: {}
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: lastName
      displayName: ${lastName}
      group: basic
      validations:
        length:
          max: 255
        person-name-prohibited-characters: {}
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: birthdate
      displayName: Födelsedatum
      group: basic
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: locale
      displayName: Språk
      group: basic
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: scouterna_email
      displayName: Scouterna e-post
      group: contact
      validations:
        email: {}
        length:
          max: 255
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: alt_email
      displayName: Alternativ e-post
      group: contact
      validations:
        email: {}
        length:
          max: 255
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: phone_number
      displayName: Mobilnummer
      group: contact
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: picture
      displayName: Profilbild
      group: basic
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: scoutnet_member_no
      displayName: Medlemsnummer
      group: scout
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: primary_group_name
      displayName: Primär scoutkår
      group: scout
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: primary_group_no
      displayName: Primär scoutkår - ID
      group: scout
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: memberships
      displayName: Medlemskap och roller
      group: scout
      annotations:
        inputType: textarea
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: group_emails_json
      displayName: Kåre-postadresser
      group: scout
      annotations:
        inputType: textarea
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: firstlast
      displayName: first.last
      permissions:
        view: [admin]
        edit: [admin]

# The jamboree26 realm holds all ScoutID/Scoutnet login config. The master realm
# is left stock (admin only) — see 00-master note in deploy README. Mirrors the
# master/jamboree26 separation on dev.id.scouterna.se.
realm: jamboree26
enabled: true

# Token and session lifetimes
accessTokenLifespan: 300          # 5 minutes
ssoSessionIdleTimeout: 2592000    # 30 days
ssoSessionMaxLifespan: 2592000    # 30 days

# Shared ScoutID login theme (baked into the image from scoutid-keycloak-theme).
# Applied to jamboree26 only; the master/admin realm stays on the default theme.
loginTheme: scoutid

# Internationalization — the login theme ships en + sv (theme/src/login/i18n.ts).
# Swedish is the primary audience; English is available via ?ui_locales=en or an
# Accept-Language: en browser. Without this block Keycloak only serves the
# default locale and ignores ui_locales/Accept-Language.
internationalizationEnabled: true
supportedLocales:
  - sv
  - en
defaultLocale: sv

# Login settings
registrationAllowed: false
resetPasswordAllowed: false
rememberMe: false
loginWithEmailAllowed: true
registrationEmailAsUsername: false
duplicateEmailsAllowed: true
verifyEmail: false
editUsernameAllowed: false

attributes:
  userProfileEnabled: "true"

userProfile:
  groups:
    - name: basic
      displayHeader: Grunduppgifter
    - name: scout
      displayHeader: Scoutuppgifter

  attributes:
    - name: username
      displayName: ${username}
      group: basic
      validations:
        length:
          min: 3
          max: 255
        username-prohibited-characters: {}
        up-username-not-idn-homograph: {}
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: email
      displayName: ${email}
      group: basic
      validations:
        email: {}
        length:
          max: 255
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: firstName
      displayName: ${firstName}
      group: basic
      validations:
        length:
          max: 255
        person-name-prohibited-characters: {}
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: lastName
      displayName: ${lastName}
      group: basic
      validations:
        length:
          max: 255
        person-name-prohibited-characters: {}
      required:
        roles: [user]
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: birthdate
      displayName: Födelsedatum
      group: basic
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: locale
      displayName: Språk
      group: basic
      permissions:
        view: [admin, user]
        edit: [admin]

    - name: scoutnet_member_no
      displayName: Medlemsnummer
      group: scout
      permissions:
        view: [admin, user]
        edit: [admin]

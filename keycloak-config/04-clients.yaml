realm: jamboree26

clients:
  # Account console needs access to all scopes to show custom attributes
  - clientId: account
    defaultClientScopes:
      - profile
      - email
      - phone
      - scoutnet-memberships

  # Keep the admin console on the built-in browser flow so admin login still works
  - clientId: security-admin-console
    authenticationFlowBindingOverrides:
      browser: browser
    attributes:
      login_theme: keycloak.v2

  - clientId: j26-notifications
    name: j26-notifications
    description: "Service account for the notifications backend — reads users and groups"
    enabled: true
    publicClient: false
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    secret: $(env:J26_NOTIFICATIONS_CLIENT_SECRET)
    defaultClientScopes:
      - service_account
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email

  - clientId: scout-test-client
    name: Scout Test Client
    description: "Development client for testing ScoutID login"
    enabled: true
    publicClient: true
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    redirectUris:
      - "http://localhost:*"
      - "https://localhost:*"
    webOrigins:
      - "+"
    consentRequired: true
    defaultClientScopes:
      - profile
      - email
      - phone
      - scoutnet-memberships

users:
  - username: service-account-j26-notifications
    enabled: true
    serviceAccountClientId: j26-notifications
    clientRoles:
      realm-management:
        - query-groups
        - view-users
